services:
  - type: web
    name: pepcheck-api
    runtime: python
    buildCommand: pip install -r backend/app/requirements.txt && playwright install chromium
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /
